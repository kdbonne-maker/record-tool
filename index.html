<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>자율·자치활동 특기사항 생성기 (오프라인)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#FBFAF6; --card:#FFFFFF;
    --ink:#20272E; --ink-soft:#5A6470; --ink-faint:#8A929B;
    --pine:#2E6B59; --pine-deep:#234F42; --pine-tint:#E9F1ED;
    --line:#E4E0D5; --line-soft:#EEEBE2;
    --amber:#9A6B12; --amber-tint:#FBF3E0;
    --danger:#B4423A; --danger-tint:#FBECEA;
    --radius:7px;
    --serif:"Noto Serif KR", serif;
    --sans:"Pretendard","Pretendard Variable",-apple-system,BlinkMacSystemFont,system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{font-family:var(--sans); color:var(--ink); background:var(--paper); font-size:15px; line-height:1.65; -webkit-font-smoothing:antialiased;}
  button{font-family:inherit; cursor:pointer}
  textarea,input{font-family:inherit; color:var(--ink)}
  ::selection{background:var(--pine-tint)}

  header.app{border-bottom:1px solid var(--line); background:var(--paper); position:sticky; top:0; z-index:20;}
  .header-inner{max-width:1180px; margin:0 auto; padding:16px 24px; display:flex; align-items:flex-end; justify-content:space-between; gap:16px;}
  .brand h1{font-family:var(--serif); font-weight:700; font-size:21px; letter-spacing:-.01em; margin:0; line-height:1.2;}
  .brand .sub{color:var(--ink-soft); font-size:12.5px; margin-top:3px;}
  .brand .rule{height:3px; width:46px; margin-top:8px; background:var(--pine); border-radius:2px; box-shadow:0 5px 0 -1px var(--pine-tint);}
  .header-actions{display:flex; gap:8px; align-items:center}
  .ghost-btn{border:1px solid var(--line); background:var(--card); color:var(--ink-soft); border-radius:var(--radius); padding:8px 12px; font-size:13px; font-weight:600; display:inline-flex; align-items:center; gap:6px; transition:.15s;}
  .ghost-btn:hover{border-color:var(--pine); color:var(--pine)}
  .ghost-btn svg{width:15px;height:15px}

  main{max-width:1180px; margin:0 auto; padding:24px}

  .rule-banner{background:var(--pine-tint); border:1px solid #CFE3DA; color:var(--pine-deep); border-radius:var(--radius); padding:12px 15px; font-size:13px; line-height:1.6; margin-bottom:20px; display:flex; gap:10px;}
  .rule-banner b{font-weight:700}
  .rule-banner svg{width:17px;height:17px;flex:0 0 auto;margin-top:2px}

  .grid{display:grid; grid-template-columns: 1fr; gap:20px}
  @media(min-width:980px){ .grid{grid-template-columns: 0.92fr 1.08fr} }

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden;}
  .card + .card{margin-top:20px}
  .card-head{padding:14px 18px; border-bottom:1px solid var(--line-soft); display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .card-head h2{font-family:var(--serif); font-size:15.5px; font-weight:600; margin:0; display:flex; align-items:center; gap:9px;}
  .card-head .badge{font-size:11px; font-weight:700; color:var(--pine-deep); background:var(--pine-tint); border-radius:20px; padding:3px 9px;}
  .card-body{padding:18px}
  .hint{font-size:12px; color:var(--ink-faint); margin:0 0 12px}
  .sub-label{font-size:12px;font-weight:700;color:var(--ink-soft);margin:0 0 7px}

  .input, textarea.input{width:100%; border:1px solid var(--line); border-radius:6px; background:#FCFCFA; padding:9px 11px; font-size:14px; transition:.15s; resize:vertical;}
  .input:focus, textarea.input:focus{outline:none; border-color:var(--pine); box-shadow:0 0 0 3px var(--pine-tint); background:#fff;}

  .preset-wrap{border:1px dashed var(--line); border-radius:8px; padding:12px; background:#FCFBF7; margin-bottom:14px; max-height:230px; overflow:auto;}
  .preset-row{display:flex; flex-wrap:wrap; gap:6px}
  .chip{border:1px solid var(--line); background:#fff; color:var(--ink-soft); border-radius:20px; padding:5px 11px; font-size:12px; font-weight:600; transition:.13s; white-space:nowrap;}
  .chip:hover{border-color:var(--pine); color:var(--pine); background:var(--pine-tint)}
  .chip .d{opacity:.6; font-weight:700; margin-left:4px}
  .chip.added{background:var(--pine-tint); border-color:var(--pine); color:var(--pine-deep)}

  .activity{border:1px solid var(--line-soft); border-radius:6px; padding:11px 12px; margin-bottom:9px; background:#FCFBF7; position:relative;}
  .activity .act-title{font-weight:700; font-size:13.5px}
  .activity .act-title .date{color:var(--pine); font-weight:700; margin-left:4px}
  .act-del{position:absolute; top:8px; right:8px; border:none; background:transparent; color:var(--ink-faint); font-size:16px; line-height:1; padding:2px 5px; border-radius:5px;}
  .act-del:hover{color:var(--danger); background:var(--danger-tint)}

  .btn{border:none; border-radius:6px; padding:9px 14px; font-size:13.5px; font-weight:700; display:inline-flex; align-items:center; justify-content:center; gap:7px; transition:.15s;}
  .btn-primary{background:var(--pine); color:#fff}
  .btn-primary:hover{background:var(--pine-deep)}
  .btn-soft{background:var(--pine-tint); color:var(--pine-deep)}
  .btn-soft:hover{background:#DCE9E2}
  .btn-line{background:#fff; border:1px solid var(--line); color:var(--ink-soft)}
  .btn-line:hover{border-color:var(--pine); color:var(--pine)}
  .btn svg{width:15px;height:15px}
  .btn-full{width:100%}
  .btn-sm{padding:7px 11px;font-size:12.5px}

  .custom-add{display:flex; gap:8px; margin-top:8px}
  .custom-add input.cdate{flex:0 0 96px}

  .roster{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px}
  .stu-tab{border:1px solid var(--line); background:#fff; border-radius:6px; padding:6px 10px; font-size:12.5px; font-weight:600; color:var(--ink-soft); display:inline-flex; align-items:center; gap:6px; transition:.12s;}
  .stu-tab:hover{border-color:var(--pine)}
  .stu-tab.active{background:var(--pine); border-color:var(--pine); color:#fff}
  .stu-tab .check{color:var(--pine); font-size:13px}
  .stu-tab.active .check{color:#BFE8D6}
  .stu-tab .num{opacity:.7; font-weight:700}

  .stu-add{display:flex; gap:8px}
  .stu-add input.num{flex:0 0 64px}
  .stu-add input.nm{flex:1}
  .uploader{display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap}

  .empty-note{text-align:center; color:var(--ink-faint); font-size:13px; padding:24px 10px; border:1px dashed var(--line); border-radius:6px; background:#FCFBF7;}

  .stu-editor .whorow{display:flex; gap:12px; align-items:center; margin-bottom:14px}
  .stu-editor .who{font-family:var(--serif); font-size:16px; font-weight:600}
  .stu-editor .who .n{color:var(--pine); margin-right:6px}
  .stu-del-btn{margin-left:auto}

  .kw-group{border:1px solid var(--line-soft); border-radius:7px; padding:11px 12px; margin-bottom:10px; background:#fff;}
  .kw-group .gh{font-size:12.5px; font-weight:700; margin-bottom:8px; color:var(--ink);}
  .kw-group .gh .gd{color:var(--pine); font-weight:700}
  .kw-group.closing{background:#FCFBF7}
  .kw-chips{display:flex; flex-wrap:wrap; gap:6px}
  .kw{border:1px solid var(--line); background:#fff; color:var(--ink-soft); border-radius:18px; padding:5px 11px; font-size:12px; font-weight:600; transition:.1s; user-select:none; text-align:left;}
  .kw:hover{border-color:var(--pine)}
  .kw.on{background:var(--pine); border-color:var(--pine); color:#fff}
  .kw-add{border:1px dashed var(--line); color:var(--ink-faint); background:#fff; border-radius:18px; padding:5px 10px; font-size:12px; font-weight:600;}
  .kw-add:hover{border-color:var(--pine); color:var(--pine)}

  .result-box{width:100%; min-height:210px; border:1px solid var(--line); border-radius:6px; padding:14px 16px 14px 18px; font-size:14.5px; line-height:1.9; resize:vertical; background:var(--card); border-left:3px solid var(--pine);}
  .result-box:focus{outline:none; box-shadow:0 0 0 3px var(--pine-tint)}
  .result-box::placeholder{color:var(--ink-faint)}
  .counter{display:flex; align-items:center; gap:14px; margin-top:9px; font-size:12px; color:var(--ink-soft);}
  .counter b{color:var(--ink); font-variant-numeric:tabular-nums}
  .result-actions{display:flex; gap:8px; margin-top:12px; flex-wrap:wrap}

  .toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:#fff; padding:11px 18px; border-radius:8px; font-size:13.5px; font-weight:600; opacity:0; pointer-events:none; transition:.25s; z-index:60; box-shadow:0 8px 24px rgba(0,0,0,.18);}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  .toast.err{background:var(--danger)}
  .hide{display:none !important}
  .keynote{font-size:11.5px; color:var(--ink-faint); margin:0; line-height:1.55}
</style>
</head>
<body>

<header class="app">
  <div class="header-inner">
    <div class="brand">
      <h1>자율·자치활동 특기사항 생성기</h1>
      <div class="sub">오프라인 · 키워드 클릭으로 문장 조합 · API 키 불필요</div>
      <div class="rule"></div>
    </div>
    <div class="header-actions">
      <button class="ghost-btn" id="exportBtn" title="작성한 학생을 CSV로 내보내기">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>내보내기
      </button>
    </div>
  </div>
</header>

<main>
  <div class="rule-banner">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 12l2 2 4-4"/><circle cx="12" cy="12" r="9"/></svg>
    <div>인터넷·API 키·비용 없이 동작합니다. 키워드를 클릭하면 미리 다듬어 둔 문구가 <b>활동명(2026.MM.DD.)</b> 형식·명사형으로 조합됩니다. 생성 후 사실에 맞게 직접 수정해 쓰세요.</div>
  </div>

  <div class="grid">
    <!-- LEFT -->
    <div>
      <div class="card">
        <div class="card-head"><h2>① 활동 선택</h2><span class="badge">자료1</span></div>
        <div class="card-body">
          <p class="hint">학급 전체가 참여한 활동을 클릭해 등록하세요.</p>
          <div class="preset-wrap"><div class="preset-row" id="presetRow"></div></div>
          <div id="activityList"></div>
          <div class="custom-add">
            <input class="input" id="cName" placeholder="직접 추가 — 활동명" />
            <input class="input cdate" id="cDate" placeholder="MM/DD" />
            <button class="btn btn-line btn-sm" id="addCustom">추가</button>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-head"><h2>② 학생 명단</h2></div>
        <div class="card-body">
          <div class="uploader">
            <button class="btn btn-soft btn-sm" id="uploadBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>
              엑셀·CSV 업로드
            </button>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="hide" />
            <span class="keynote">번호·이름 두 열이면 됩니다.</span>
          </div>
          <div class="roster" id="roster"></div>
          <div class="stu-add">
            <input class="input num" id="newNum" placeholder="번호" inputmode="numeric" />
            <input class="input nm" id="newName" placeholder="이름 입력 후 Enter" />
            <button class="btn btn-soft btn-sm" id="addStudent">추가</button>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="card">
      <div class="card-head"><h2>③ 특기사항 작성</h2></div>
      <div class="card-body">
        <div id="noStudent" class="empty-note">학생을 추가하고 선택하면 여기에서 작성합니다.</div>

        <div id="stuEditor" class="stu-editor hide">
          <div class="whorow">
            <div class="who"><span class="n" id="whoNum"></span><span id="whoName"></span></div>
            <button class="btn btn-line stu-del-btn btn-sm" id="delStudent">학생 삭제</button>
          </div>

          <p class="sub-label">활동별 내용 — 해당하는 키워드를 클릭하세요</p>
          <div id="kwGroups"></div>

          <button class="btn btn-primary btn-full" id="generateBtn" style="margin-top:6px">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 3l2.5 6.5L22 12l-6.5 2.5L13 21l-2.5-6.5L4 12l6.5-2.5L13 3z"/></svg>
            특기사항 만들기
          </button>

          <div style="margin-top:18px">
            <label class="sub-label">생성 결과 — 자유롭게 수정하세요</label>
            <textarea class="result-box" id="resultBox" placeholder="키워드를 고르고 '특기사항 만들기'를 누르면 활동별 문장이 여기에 조합됩니다."></textarea>
            <div class="counter"><span><b id="cChar">0</b>자</span><span><b id="cByte">0</b>바이트</span></div>
            <div class="result-actions">
              <button class="btn btn-soft" id="regenBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/></svg>
                다시 조합
              </button>
              <button class="btn btn-line" id="copyBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                복사
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const LS={acts:"jajul_off_acts",studs:"jajul_off_studs"};

  const ACTIVITY_PRESETS=[
    {name:"학급회의",date:"2026.03.03"},{name:"개학식",date:"2026.03.03"},
    {name:"학생 인권 교육",date:"2026.03.03"},{name:"과학실 안전교육",date:"2026.03.03"},
    {name:"자살 예방 및 사회정서교육",date:"2026.03.04"},{name:"성폭력 예방교육",date:"2026.03.04"},
    {name:"교육활동 침해행위 예방교육",date:"2026.03.05"},{name:"학급회의",date:"2026.03.12"},
    {name:"학급회의",date:"2026.04.01"},{name:"과학의날 대회 및 행사",date:"2026.04.02"},
    {name:"장애이해교육",date:"2026.04.29"},{name:"학급회의",date:"2026.05.07"},
    {name:"어울마당",date:"2026.05.15"},{name:"학교폭력 예방교육",date:"2026.05.20"},
    {name:"학급회의",date:"2026.06.11"},{name:"성교육",date:"2026.06.29"},
    {name:"약물 오남용 및 마약 예방 교육",date:"2026.07.16"},{name:"안전교육",date:"2026.07.20"},
    {name:"인터넷 스마트폰 중독 예방교육",date:"2026.07.20"},{name:"학급회의",date:"2026.07.21"},
    {name:"방학식",date:"2026.07.21"}
  ];

  const KEYWORDS={
    회의:["회장 역할","부회장 역할","안건 발의","회의 진행","회의 기록(서기)",
      "월요일 청소","화요일 청소","수요일 청소","목요일 청소","금요일 청소",
      "분리수거","칠판 관리","게시판 관리","전등·냉난방 관리","휴대전화 가방 관리",
      "학급물품 관리","창문 관리","출석부 관리(우체부)","시건장치 관리(문지기)","선풍기 청소·점검"],
    어울마당:["여러 종목 참여","달리기","줄다리기","다인다각","응원 주도","응원석 끝까지",
      "도시락 만들어 나눔","대기장소 청소","단체복 준비","기념사진 촬영","질서 지도","스승의 날 편지"],
    인권교권:["존중·협력 관계 발표","실천 방법 발표","실천 약속 세우기","사례 조사·발표","소감문 작성"],
    학폭:["예방 사례 조사","예방 다짐 발표","역할극 참여","캠페인 문구 작성","소감문 작성"],
    장애:["장애 이해 체험","배려 실천 방법 발표","소감문 작성"],
    정서:["감정 표현 활동","스트레스 대처법 발표","친구 돕는 방법 작성","소감문 작성"],
    성:["예방 수칙 정리","올바른 경계 발표","소감문 작성"],

    스마트폰:["사용 습관 점검","건강 문제 조사","사용 규칙 세우기","소감문 작성"],
    안전:["안전 수칙 숙지","대피 요령 익힘","실습·실험 안전수칙 준수"],
    과학의날:["주제 발표","대회 참가","작품 제작"],
    기타:[]
  };

  const LEADER={
    "회장 역할":"1학기 학급자치회 회장(2026.03.01.-2026.08.17.)으로서 학급회의 안건을 정하고 회의를 진행하며 후보 공약을 실천함.",
    "부회장 역할":"1학기 학급자치회 부회장(2026.03.01.-2026.08.17.)으로서 회의 안건을 정하고 회의 내용을 기록하며 회장을 도와 학급 일을 운영함."
  };

  const PHRASES={
    // 학급회의 / 자치
    "안건 발의":"학급 생활과 관련된 안건을 발의함",

  const CLOSINGS=[
    "맡은 역할을 책임감 있게 수행하고 친구들과 협력하는 모습을 꾸준히 보임.",

  ];

  const EDU=["인권교권","학폭","장애","정서","성","약물","스마트폰","안전"];
  function categorize(name){
    if(/학급회의/.test(name)) return "회의";
    if(/어울마당/.test(name)) return "어울마당";
    if(/인권|침해/.test(name)) return "인권교권";
    if(/학교폭력/.test(name)) return "학폭";
    if(/장애/.test(name)) return "장애";
    if(/자살|사회정서/.test(name)) return "정서";
    if(/성폭력|성교육/.test(name)) return "성";
    if(/약물|마약/.test(name)) return "약물";
    if(/스마트폰|중독|인터넷/.test(name)) return "스마트폰";
    if(/안전/.test(name)) return "안전";
    if(/과학의?\s?날/.test(name)) return "과학의날";
    return "기타";
  }

  const state={activities:load(LS.acts,[]),students:load(LS.studs,[]),currentId:null};
  function load(k,d){try{return JSON.parse(localStorage.getItem(k))||d;}catch(e){return d;}}
  function persist(){localStorage.setItem(LS.acts,JSON.stringify(state.activities));localStorage.setItem(LS.studs,JSON.stringify(state.students));}
  function uid(){return Math.random().toString(36).slice(2,9);}
  function $(s){return document.querySelector(s);}
  function chars(s){return [...(s||"")].length;}
  function bytes(s){let b=0;for(const ch of (s||"")) b+=ch.codePointAt(0)>127?3:1;return b;}
  function esc(s){return (s||"").replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
  function shortDate(d){const p=d.split(".");return parseInt(p[1],10)+"/"+parseInt(p[2],10);}
  function fmtDate(d){return "("+d+".)";}

  let toastT;
  function toast(msg,isErr){const t=$("#toast");t.textContent=msg;t.className="toast show"+(isErr?" err":"");clearTimeout(toastT);toastT=setTimeout(()=>{t.className="toast";},2400);}

  // presets / activities
  function activityExists(n,d){return state.activities.some(a=>a.name===n&&a.date===d);}
  function renderPresets(){
    const row=$("#presetRow");row.innerHTML="";
    ACTIVITY_PRESETS.forEach(p=>{
      const b=document.createElement("button");
      b.className="chip"+(activityExists(p.name,p.date)?" added":"");
      b.innerHTML=esc(p.name)+'<span class="d">'+shortDate(p.date)+'</span>';
      b.addEventListener("click",()=>{
        if(activityExists(p.name,p.date)){toast("이미 추가된 활동입니다.");return;}
        state.activities.push({id:uid(),name:p.name,date:p.date});
        persist();renderPresets();renderActivities();renderEditor();
      });
      row.appendChild(b);
    });
  }
  function renderActivities(){
    const list=$("#activityList");list.innerHTML="";
    if(state.activities.length===0){list.innerHTML='<p class="hint" style="margin:6px 0 10px">위에서 활동을 클릭해 등록하세요.</p>';return;}
    state.activities.slice().sort((a,b)=>a.date.localeCompare(b.date)).forEach(a=>{
      const div=document.createElement("div");div.className="activity";
      div.innerHTML='<button class="act-del" title="삭제">&times;</button><div class="act-title">'+esc(a.name)+'<span class="date">'+fmtDate(a.date)+'</span></div>';
      div.querySelector(".act-del").addEventListener("click",()=>{
        state.activities=state.activities.filter(x=>x.id!==a.id);
        state.students.forEach(s=>{if(s.sel)delete s.sel[a.id];});
        persist();renderPresets();renderActivities();renderEditor();
      });
      list.appendChild(div);
    });
  }
  $("#addCustom").addEventListener("click",()=>{
    const name=$("#cName").value.trim();const raw=$("#cDate").value.trim();
    if(!name){toast("활동명을 입력하세요.",true);return;}
    const m=raw.match(/(\d{1,2})[\/.](\d{1,2})/);
    if(!m){toast("날짜는 MM/DD 형식으로 입력하세요.",true);return;}
    const date="2026."+String(m[1]).padStart(2,"0")+"."+String(m[2]).padStart(2,"0");
    if(activityExists(name,date)){toast("이미 추가된 활동입니다.");return;}
    state.activities.push({id:uid(),name,date});
    $("#cName").value="";$("#cDate").value="";
    persist();renderPresets();renderActivities();renderEditor();
  });

  // students
  function renderRoster(){
    const r=$("#roster");r.innerHTML="";
    if(state.students.length===0){r.innerHTML='<span style="color:var(--ink-faint);font-size:12.5px">등록된 학생이 없습니다.</span>';return;}
    state.students.forEach(s=>{
      const b=document.createElement("button");
      b.className="stu-tab"+(s.id===state.currentId?" active":"");
      const done=(s.result&&s.result.trim())?'<span class="check">✓</span>':'';
      b.innerHTML=(s.num?('<span class="num">'+esc(String(s.num))+'</span>'):'')+esc(s.name)+done;
      b.addEventListener("click",()=>{state.currentId=s.id;renderRoster();renderEditor();});
      r.appendChild(b);
    });
  }
  function addStudent(){
    const name=$("#newName").value.trim();const num=$("#newNum").value.trim();
    if(!name){toast("이름을 입력하세요.",true);return;}
    const s={id:uid(),num,name,sel:{},closing:"",result:""};
    state.students.push(s);state.currentId=s.id;
    $("#newName").value="";$("#newNum").value="";
    persist();renderRoster();renderEditor();$("#newNum").focus();
  }
  $("#addStudent").addEventListener("click",addStudent);
  $("#newName").addEventListener("keydown",e=>{if(e.key==="Enter")addStudent();});
  $("#newNum").addEventListener("keydown",e=>{if(e.key==="Enter")$("#newName").focus();});
  $("#delStudent").addEventListener("click",()=>{
    const s=current();if(!s)return;
    if(!confirm(s.name+" 학생을 삭제할까요?"))return;
    state.students=state.students.filter(x=>x.id!==s.id);
    state.currentId=state.students.length?state.students[0].id:null;
    persist();renderRoster();renderEditor();
  });
  function current(){return state.students.find(s=>s.id===state.currentId)||null;}

  // excel/csv
  $("#uploadBtn").addEventListener("click",()=>$("#fileInput").click());
  $("#fileInput").addEventListener("change",e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const wb=XLSX.read(new Uint8Array(ev.target.result),{type:"array"});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""}).filter(r=>r.some(c=>String(c).trim()!==""));
        if(rows.length===0){toast("빈 파일입니다.",true);return;}
        let start=0,numCol=0,nameCol=1;
        const head=rows[0].map(c=>String(c).trim());
        const findCol=(keys)=>head.findIndex(h=>keys.some(k=>h.includes(k)));
        const nc=findCol(["번호","번","No","no","NO"]);
        const mc=findCol(["이름","성명","name","Name","NAME"]);
        if(nc>=0||mc>=0){start=1;if(nc>=0)numCol=nc;if(mc>=0)nameCol=mc;if(nc<0)numCol=(nameCol===0?1:0);if(mc<0)nameCol=(numCol===0?1:0);}
        const parsed=[];
        for(let i=start;i<rows.length;i++){
          const row=rows[i];
          const num=String(row[numCol]!=null?row[numCol]:"").trim();
          const name=String(row[nameCol]!=null?row[nameCol]:"").trim();
          if(!name) continue;parsed.push({num,name});
        }
        if(parsed.length===0){toast("번호·이름을 찾지 못했습니다.",true);return;}
        if(state.students.length>0 && !confirm("기존 명단("+state.students.length+"명)을 파일 내용("+parsed.length+"명)으로 교체할까요?"))return;
        state.students=parsed.map(p=>({id:uid(),num:p.num,name:p.name,sel:{},closing:"",result:""}));
        state.currentId=state.students[0].id;
        persist();renderRoster();renderEditor();toast(parsed.length+"명을 불러왔습니다.");
      }catch(err){toast("파일을 읽지 못했습니다. 형식을 확인하세요.",true);}
      finally{$("#fileInput").value="";}
    };
    reader.readAsArrayBuffer(file);
  });

  // editor
  function renderEditor(){
    const s=current();
    if(!s){$("#noStudent").classList.remove("hide");$("#stuEditor").classList.add("hide");return;}
    $("#noStudent").classList.add("hide");$("#stuEditor").classList.remove("hide");
    $("#whoNum").textContent=s.num?(s.num+"번"):"";$("#whoName").textContent=s.name;
    if(!s.sel)s.sel={};
    const wrap=$("#kwGroups");wrap.innerHTML="";
    const acts=state.activities.slice().sort((a,b)=>a.date.localeCompare(b.date));
    if(acts.length===0) wrap.innerHTML='<p class="hint">먼저 ① 활동을 등록하면 활동별 키워드가 나타납니다.</p>';
    acts.forEach(a=>{
      const cat=categorize(a.name);const chips=KEYWORDS[cat]||[];
      if(chips.length===0) return;
      const sel=s.sel[a.id]||[];
      const g=document.createElement("div");g.className="kw-group";
      let html='<div class="gh">'+esc(a.name)+'<span class="gd"> '+fmtDate(a.date)+'</span></div><div class="kw-chips">';
      chips.forEach(kw=>{html+='<button class="kw'+(sel.includes(kw)?" on":"")+'" data-kw="'+esc(kw)+'">'+esc(kw)+'</button>';});
      html+='</div>';g.innerHTML=html;
      g.querySelectorAll(".kw").forEach(btn=>{
        btn.addEventListener("click",()=>{
          const kw=btn.getAttribute("data-kw");let arr=s.sel[a.id]||[];
          if(arr.includes(kw)) arr=arr.filter(x=>x!==kw); else arr=arr.concat([kw]);
          s.sel[a.id]=arr;persist();btn.classList.toggle("on");
        });
      });
      wrap.appendChild(g);
    });
    // closing
    const cg=document.createElement("div");cg.className="kw-group closing";
    let ch='<div class="gh">마무리 문장 (선택, 하나)</div><div class="kw-chips">';
    CLOSINGS.forEach(c=>{ch+='<button class="kw'+(s.closing===c?" on":"")+'" data-closing="'+esc(c)+'">'+esc(c)+'</button>';});
    ch+='</div>';cg.innerHTML=ch;
    cg.querySelectorAll(".kw").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const c=btn.getAttribute("data-closing");
        s.closing=(s.closing===c)?"":c;persist();renderEditor();
      });
    });
    wrap.appendChild(cg);
    $("#resultBox").value=s.result||"";updateCounter();
  }
  $("#resultBox").addEventListener("input",e=>{const s=current();if(s){s.result=e.target.value;persist();}updateCounter();renderRoster();});

  function updateCounter(){const v=$("#resultBox").value;$("#cChar").textContent=chars(v);$("#cByte").textContent=bytes(v);}

  // assemble (offline)
  function sentenceFor(a,kw){
    if(LEADER[kw]) return LEADER[kw];
    const cat=categorize(a.name);
    const conn=EDU.includes(cat)?"을 통하여 ":"에서 ";
    const pred=PHRASES[kw]||(kw+"함");
    return a.name+fmtDate(a.date)+conn+pred+".";
  }
  function assemble(s){
    const acts=state.activities.slice().sort((a,b)=>a.date.localeCompare(b.date));
    const out=[];
    acts.forEach(a=>{(s.sel[a.id]||[]).forEach(kw=>{if(LEADER[kw]&&out.indexOf(LEADER[kw])<0)out.push(LEADER[kw]);});});
    acts.forEach(a=>{(s.sel[a.id]||[]).forEach(kw=>{if(!LEADER[kw])out.push(sentenceFor(a,kw));});});
    if(s.closing) out.push(s.closing);
    return out.join("\n");
  }
  function generate(){
    const s=current();if(!s)return;
    const any=Object.values(s.sel||{}).some(a=>a&&a.length)||s.closing;
    if(!any){toast("키워드를 먼저 선택하세요.",true);return;}
    s.result=assemble(s);persist();
    $("#resultBox").value=s.result;updateCounter();renderRoster();
    toast("문장을 조합했습니다. 사실에 맞게 다듬어 주세요.");
  }
  $("#generateBtn").addEventListener("click",generate);
  $("#regenBtn").addEventListener("click",generate);

  // copy / export
  $("#copyBtn").addEventListener("click",async()=>{
    const v=$("#resultBox").value;if(!v.trim()){toast("복사할 내용이 없습니다.",true);return;}
    try{await navigator.clipboard.writeText(v);toast("복사했습니다.");}
    catch(e){$("#resultBox").select();document.execCommand("copy");toast("복사했습니다.");}
  });
  $("#exportBtn").addEventListener("click",()=>{
    const done=state.students.filter(s=>s.result&&s.result.trim());
    if(done.length===0){toast("내보낼 특기사항이 없습니다.",true);return;}
    let csv="\ufeff번호,이름,특기사항,글자수,바이트\n";
    done.forEach(s=>{const r=(s.result||"").replace(/\r?\n/g," ").replace(/"/g,'""');
      csv+=[s.num||"",'"'+s.name+'"','"'+r+'"',chars(s.result),bytes(s.result)].join(",")+"\n";});
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);
    a.download="자율자치활동_특기사항.csv";a.click();URL.revokeObjectURL(a.href);
    toast(done.length+"명 내보냈습니다.");
  });

  // boot
  renderPresets();renderActivities();renderRoster();renderEditor();
})();
</script>
</body>
</html>
